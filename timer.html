<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0f1e;
      color: #eef2ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #4a7abf;
      margin-bottom: 40px;
    }

    .display {
      font-size: 6rem;
      font-weight: 200;
      letter-spacing: 4px;
      font-variant-numeric: tabular-nums;
      color: #a8c4f0;
      margin-bottom: 48px;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      border: 2px solid #1e3a6e;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 48px;
    }

    .display.running {
      color: #60a5fa;
    }

    .controls {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 40px;
    }

    button {
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active {
      transform: scale(0.97);
    }

    #startStop {
      background: #2563eb;
      color: #fff;
      min-width: 110px;
    }

    #startStop:hover {
      background: #1d4ed8;
    }

    #startStop.running {
      background: #1e40af;
      color: #bfdbfe;
    }

    #reset {
      background: #0f1f3d;
      color: #6b9fd4;
    }

    #reset:hover {
      background: #172a50;
      color: #93c5fd;
    }

    .laps {
      max-height: 220px;
      overflow-y: auto;
      width: 320px;
      margin: 0 auto;
    }

    .laps::-webkit-scrollbar {
      width: 4px;
    }

    .laps::-webkit-scrollbar-thumb {
      background: #1e3a6e;
      border-radius: 4px;
    }

    .lap-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid #0f1f3d;
      font-size: 0.9rem;
      color: #6b9fd4;
    }

    .lap-item:first-child {
      color: #60a5fa;
    }

    .lap-item .lap-num {
      color: #2a4a7f;
    }

    #lapBtn {
      background: #0f1f3d;
      color: #6b9fd4;
    }

    #lapBtn:hover {
      background: #172a50;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Stopwatch</h1>
    <div class="display" id="display">00:00.00</div>
    <div class="controls">
      <button id="startStop">Start</button>
      <button id="lapBtn">Lap</button>
      <button id="reset">Reset</button>
    </div>
    <div class="laps" id="laps"></div>
  </div>

  <script>
    let startTime = 0;
    let elapsed = 0;
    let timerInterval = null;
    let running = false;
    let laps = [];

    const display = document.getElementById('display');
    const startStop = document.getElementById('startStop');
    const resetBtn = document.getElementById('reset');
    const lapBtn = document.getElementById('lapBtn');
    const lapsEl = document.getElementById('laps');

    function format(ms) {
      const minutes = Math.floor(ms / 60000);
      const seconds = Math.floor((ms % 60000) / 1000);
      const centiseconds = Math.floor((ms % 1000) / 10);
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(centiseconds).padStart(2, '0')}`;
    }

    function tick() {
      elapsed = Date.now() - startTime;
      display.textContent = format(elapsed);
    }

    startStop.addEventListener('click', () => {
      if (!running) {
        startTime = Date.now() - elapsed;
        timerInterval = setInterval(tick, 10);
        running = true;
        startStop.textContent = 'Stop';
        startStop.classList.add('running');
        display.classList.add('running');
      } else {
        clearInterval(timerInterval);
        running = false;
        startStop.textContent = 'Start';
        startStop.classList.remove('running');
        display.classList.remove('running');
      }
    });

    resetBtn.addEventListener('click', () => {
      clearInterval(timerInterval);
      running = false;
      elapsed = 0;
      laps = [];
      display.textContent = '00:00.00';
      display.classList.remove('running');
      startStop.textContent = 'Start';
      startStop.classList.remove('running');
      lapsEl.innerHTML = '';
    });

    lapBtn.addEventListener('click', () => {
      if (!running && elapsed === 0) return;
      laps.unshift(elapsed);
      renderLaps();
    });

    function renderLaps() {
      lapsEl.innerHTML = laps.map((t, i) => {
        const lapTime = i === laps.length - 1 ? t : t - laps[i + 1];
        return `
          <div class="lap-item">
            <span class="lap-num">Lap ${laps.length - i}</span>
            <span>${format(lapTime)}</span>
            <span>${format(t)}</span>
          </div>`;
      }).join('');
    }
  </script>
</body>
</html>
